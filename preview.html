<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Project Mudra Malayalam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600;700&display=swap" rel="stylesheet">
<script src="vocabulary.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#1C1C1E;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;
    font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;
    gap:14px;
  }
  .label{color:rgba(255,255,255,.28);font-size:10px;letter-spacing:3px;
    text-transform:uppercase;font-family:'Segoe UI',sans-serif;}

  .device{
    width:400px;height:660px;background:#1B5E20;
    border-radius:28px;border:7px solid #111;
    box-shadow:0 24px 64px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.07);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .bar{
    margin:13px 13px 0;background:#fff;border-radius:10px;
    padding:9px 6px 9px 14px;display:flex;align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.2);min-height:46px;flex-shrink:0;
  }
  #out{
    flex:1;font-size:17px;color:#1A1A1A;
    font-family:'Noto Sans Malayalam',sans-serif;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  #out.ph{color:transparent;}
  #out::after{
    content:'|';color:#1A1A1A;font-size:17px;
    animation:blink .9s step-start infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  #out.nocaret::after{content:none;}
  #out .rd {color:#1A1A1A;}
  #out .ur {color:rgba(26,26,26,0.35);}
  #out .pcur{
    display:inline-block;width:2px;height:1.1em;
    background:#1A1A1A;vertical-align:middle;margin:0 1px;
    animation:blink .9s step-start infinite;
  }
  #out.playing .pcur{background:#2E7D32;}
  .send{
    background:#2E7D32;border:none;border-radius:7px;
    width:34px;height:34px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    margin-left:6px;flex-shrink:0;transition:background .15s;
  }
  .send:hover{background:#1B5E20;}
  .send.playing{background:#B71C1C;}
  .send.playing:hover{background:#7F0000;}
  .send svg{width:17px;height:17px;fill:#fff;}

  .area{flex:1;position:relative;touch-action:none;}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;}
  .hint{
    position:absolute;bottom:12px;left:0;right:0;
    text-align:center;font-size:11px;
    color:rgba(255,255,255,.38);pointer-events:none;
    font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;
    padding:0 12px;line-height:1.5;
  }

  /* Neil: trigger zone overlay — position set dynamically in resize() */
  #kzone{
    position:absolute;
    border:2px dashed rgba(255,255,255,0.45);
    border-radius:14px;
    pointer-events:none;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:8px;
  }
  #kzone .kz-label{
    font-size:11px;color:rgba(255,255,255,0.38);
    font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;letter-spacing:.5px;
    white-space:normal;text-align:center;
    padding:0 12px;line-height:1.5;
  }

  /* Neil: suggestion bar */
  .sug-wrap{
    display:flex;align-items:stretch;
    background:rgba(0,0,0,.18);flex-shrink:0;min-height:38px;
  }
  .sug-nav{
    flex-shrink:0;width:36px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;cursor:pointer;
    color:rgba(255,255,255,.5);transition:color .15s;
  }
  .sug-nav:hover{color:rgba(255,255,255,.9);}
  .sug-nav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .sug-bar{
    display:flex;gap:8px;padding:6px 4px;
    flex:1;min-width:0;
    align-items:center;overflow-x:auto;
    scrollbar-width:none;
  }
  .sug-bar::-webkit-scrollbar{display:none;}
  .sug-bar:empty::after{
    content:'നിർദ്ദേശങ്ങൾ കാണുന്നതിനായി ടൈപ്പ് ചെയ്തു തുടങ്ങുക..';
    font-size:11px;color:rgba(255,255,255,.25);
    font-family:'Segoe UI',sans-serif;
  }
  .sug-chip{
    background:rgba(255,255,255,.12);color:rgba(255,255,255,.9);
    border:1px solid rgba(255,255,255,.2);border-radius:16px;
    padding:3px 13px;
    font-family:'Noto Sans Malayalam','Segoe UI',sans-serif;
    font-size:14px;cursor:pointer;white-space:nowrap;
    flex-shrink:0;transition:background .15s,color .15s;
  }
  .sug-chip:hover{background:rgba(255,255,255,.22);}
  .sug-chip:active{background:#FFD54F;color:#1A0A00;border-color:#FFD54F;}
  .sug-chip.selected{background:rgba(255,213,79,.35);border-color:#FFD54F;color:#fff;}

  .legend{display:flex;gap:20px;font-size:11px;
    color:rgba(255,255,255,.45);font-family:'Segoe UI',sans-serif;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .dot.i{background:#4A4540;} .dot.o{background:#3A3735;}
  .dot.s{background:#F9A825;}
</style>

<body>
<div class="label">Project Mudra Malayalam — Dual Ring · Long-press for Sub-menu</div>

<div class="device">
  <div class="bar">
    <span id="out" class="ph"></span>
    <button class="send" id="snd" title="Read aloud">
      <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-stop" viewBox="0 0 24 24" style="display:none"><path d="M6 6h12v12H6z"/></svg>
    </button>
  </div>
  <div class="sug-wrap">
    <button class="sug-nav" id="sug-left" title="Scroll left">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="sug-bar" id="sug"></div>
    <button class="sug-nav" id="sug-right" title="Scroll right">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="area">
    <canvas id="c"></canvas>
    <div id="kzone">
      <span class="kz-label">ടൈപ്പ് ചെയ്യാൻ ഇവിടെ ക്ലിക്ക് ചെയ്യുക</span>
    </div>
    <div class="hint" id="hint">അക്ഷരം ചേർക്കാൻ വിരൽ ഉയർത്തുക · സബ് മെനു ലഭിക്കാൻ ഒരു സെക്കൻഡ് അമർത്തിപ്പിടിക്കുക</div>
  </div>
</div>

<div class="legend">
  <span><div class="dot i"></div>Inner — Consonants</span>
  <span><div class="dot o"></div>Outer — Vowels</span>
  <span><div class="dot s"></div>Sub-menu active</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ROOT RINGS  (10 segments each, clockwise from top = -90°)
// ═══════════════════════════════════════════════════════════
const ROOT_INNER = [
  { label:'ക',   char:'ക'   },
  { label:'ച',   char:'ച'   },
  { label:'ട',   char:'ട'   },
  { label:'ത',   char:'ത'   },
  { label:'പ',   char:'പ'   },
  { label:'യ',   char:'യ'   },
  { label:'ശ',   char:'ശ'   },
  { label:'ൻ',   char:'ൻ'   },
  { label:'ക്ക', char:'ക്ക' },
  { label:'ല്ല', char:'ല്ല' },
];

const ROOT_OUTER = [
  { label:'അ',   char:'അ'   },
  { label:'ഇ',   char:'ഇ'   },
  { label:'ഉ',   char:'ഉ'   },
  { label:'ഋ',   char:'ഋ'   },
  { label:'എ',   char:'എ'   },
  { label:'ഒ',   char:'ഒ'   },
  { label:'അം',  char:'അം'  },
  { label:'്',   char:'്'   },
  { label:'123', char:'1'   },
  { label:'&',   char:'&'   },
];

// ═══════════════════════════════════════════════════════════
//  SUB-MENUS  — keyed by root label
//  Chars fill from position 0 (top) clockwise.
//  Unfilled slots = null (shown as dim dash).
// ═══════════════════════════════════════════════════════════
const SUB_INNER = {
  'ക':   ['ക','ഖ','ഗ','ഘ','ങ'],
  'ച':   ['ച','ഛ','ജ','ഝ','ഞ'],
  'ട':   ['ട','ഠ','ഡ','ഢ','ണ'],
  'ത':   ['ത','ഥ','ദ','ധ','ന'],
  'പ':   ['പ','ഫ','ബ','ഭ','മ'],
  'യ':   ['യ','ര','ല','വ'],
  'ശ':   ['ശ','ഷ','സ','ഹ','ള','ഴ','റ'],
  'ൻ':   ['ൻ','ർ','ൽ','ൾ','ൺ'],
  'ക്ക': ['ക്ക','ച്ച','ട്ട','ത്ത','പ്പ','ന്ന'],
  'ല്ല': ['ല്ല','ള്ള','മ്മ','ർ','ൽ','ൾ'],
};
const SUB_OUTER = {
  'അ':   ['അ','ആ'],
  'ഇ':   ['ഇ','ഈ'],
  'ഉ':   ['ഉ','ഊ'],
  'ഋ':   ['ഋ','ൠ'],
  'എ':   ['എ','ഏ','ഐ'],
  'ഒ':   ['ഒ','ഓ','ഔ'],
  'അം':  ['ം','ഃ','ഁ','്'],  // ഁ = U+0D01 Candrabindu
  '്':   ['ൺ','ൻ','ർ','ൽ','ൾ'],
  '123': ['1','2','3','4','5','6','7','8','9','0'],
  '&':   ['&','@','#','!','?','.',',','"',"'",'_'],
};

// Build a 10-slot ring array from a sub-menu char list
function buildSubSegs(chars) {
  return Array.from({ length: 10 }, (_, i) => {
    const c = chars[i];
    return c ? { label: c, char: c } : null;
  });
}

// ═══════════════════════════════════════════════════════════
//  VISUAL CONFIG
// ═══════════════════════════════════════════════════════════
const N      = 10;
const SWEEP  = 36;
let R_OUT  = 148;       // outer wheel radius — recomputed on resize
const F_SPLIT = 0.60;   // inner/outer ring boundary fraction
const F_DEAD  = 0.20;   // center dead-zone fraction
const LP_MS   = 1500;   // long-press duration

const C_OUTER_BASE  = '#3A3735';
const C_INNER_BASE  = '#2D2B29';
const C_OUTER_HI    = '#90CAF9';
const C_INNER_HI    = '#80DEEA';
const C_SUB_BASE    = '#4A3B00';   // amber tint for sub-menu ring
const C_SUB_HI      = '#FFD54F';   // yellow highlight in sub-menu
const C_HI_TEXT     = '#0D2137';
const C_SUB_HI_TEXT = '#1A0A00';
const C_OUTER_TEXT  = 'rgba(255,255,255,0.90)';
const C_INNER_TEXT  = 'rgba(255,255,255,0.72)';
const C_SUB_TEXT    = 'rgba(255,220,100,0.92)';
const C_NULL_TEXT   = 'rgba(255,255,255,0.18)';
const C_DIVIDER     = 'rgba(255,255,255,0.14)';
const C_SPLIT_LINE  = 'rgba(255,255,255,0.20)';
const C_LP_PROGRESS = '#FFD54F';   // long-press arc fill
const C_LP_TRACK    = 'rgba(255,213,79,0.20)';
const C_CENTER      = '#FFFFFF';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const cv     = document.getElementById('c');
const ctx    = cv.getContext('2d');
const outEl  = document.getElementById('out');
const hintEl = document.getElementById('hint');

let st = {
  visible: false, cx: 0, cy: 0, scale: 0,
  ring: null, idx: -1,       // currently hovered ring + segment
  text: '',

  // Sub-menu state per ring
  innerSub: false,           // is inner ring in sub-menu mode?
  outerSub: false,
  innerSegs: ROOT_INNER,     // current segments for inner ring
  outerSegs: ROOT_OUTER,

  // Rotation offsets — set on first finger entry into each ring
  // so segment 0 (ക / അ) always appears under the finger
  innerRot: -90,
  outerRot: -90,

  // Long-press tracking
  lpRing: null, lpIdx: -1,
  lpStart: 0, lpFiring: false,
};

// Per-gesture flags: has the rotation been snapped yet for each ring?
let innerRotSet = false;
let outerRotSet = false;

let targetScale = 0, rafId = null;
let isDown = false;

// Suggestion navigation state
let pdX = 0, pdY = 0;          // pointerdown canvas position
let isSwiping = false;          // true while a horizontal swipe is in progress
let wheelDelayTimer = null;     // 80 ms gate before wheel appears
let sugSelectedIdx = -1;        // highlighted chip index (-1 = none)
let currentSuggestions = [];    // live copy of rendered suggestions
let lastTapTime = 0;            // timestamp of previous pointerup (double-tap)
const DOUBLE_TAP_MS = 350;      // max gap between taps to count as double
let lpTimer = null;
// 0 = inside ring, 1 = beyond right (space), -1 = beyond left (delete)
let beyondDir = 0;
let innerAlpha = 0, outerAlpha = 0;
let innerTargetAlpha = 0, outerTargetAlpha = 0;
let cursorPos  = -1;   // -1 = end of text; ≥0 = UTF-16 index insertion point
const pendingCursorTimers = [];

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function snapGrapheme(text, idx) {
  const segs = [...segmenter.segment(text)];
  let pos = 0;
  for (const seg of segs) {
    if (pos + seg.segment.length > idx) return pos;
    pos += seg.segment.length;
  }
  return pos;
}
// ═══════════════════════════════════════════════════════════
//  CANVAS RESIZE
// ═══════════════════════════════════════════════════════════
function resize() {
  const a = cv.parentElement;
  cv.width = a.clientWidth; cv.height = a.clientHeight;
  R_OUT = Math.round(Math.min(cv.width, cv.height) * 0.32);
  const pad = R_OUT + 8;
  const el = document.getElementById('kzone');
  if (el) {
    el.style.top    = pad + 'px';
    el.style.left   = pad + 'px';
    el.style.right  = pad + 'px';
    el.style.bottom = pad + 'px';
  }
  draw();
}
window.addEventListener('resize', resize); resize();

// ═══════════════════════════════════════════════════════════
//  TRIGGER ZONE — safe rectangle ensuring circle never clips edges
// ═══════════════════════════════════════════════════════════
function getTriggerZone() {
  const pad = R_OUT + 8;
  return { x: pad, y: pad, w: cv.width - pad * 2, h: cv.height - pad * 2 };
}
function inTriggerZone(px, py) {
  const z = getTriggerZone();
  return px >= z.x && px <= z.x + z.w && py >= z.y && py <= z.y + z.h;
}
// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
function scheduleAnim() {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(() => {
    st.scale += (targetScale - st.scale) * 0.20;
    innerAlpha += (innerTargetAlpha - innerAlpha) * 0.25;
    outerAlpha += (outerTargetAlpha - outerAlpha) * 0.25;
    const stillAnimating = Math.abs(targetScale - st.scale) > 0.003
      || Math.abs(innerTargetAlpha - innerAlpha) > 0.003
      || Math.abs(outerTargetAlpha - outerAlpha) > 0.003;
    const lpInProgress   = st.lpFiring && lpTimer !== null;
    draw();
    if (stillAnimating || lpInProgress) scheduleAnim();
  });
}

// ═══════════════════════════════════════════════════════════
//  SHOW / HIDE WHEEL
// ═══════════════════════════════════════════════════════════
const kzoneEl = document.getElementById('kzone');
function showWheel(x, y) {
  st.cx = x; st.cy = y; st.visible = true;
  st.scale = 1; targetScale = 1;
  st.ring = null; st.idx = -1;
  innerAlpha = 0; outerAlpha = 0;
  innerTargetAlpha = 0; outerTargetAlpha = 0;
  hintEl.style.display = 'none';
  kzoneEl.style.display = 'none';
  playActivationSound();
  scheduleAnim();
}
function hideWheel() {
  st.visible = false; st.scale = 0; targetScale = 0;
  st.ring = null; st.idx = -1;
  beyondDir = 0;
  innerAlpha = 0; outerAlpha = 0;
  innerTargetAlpha = 0; outerTargetAlpha = 0;
  cancelLp();
  draw();
  kzoneEl.style.display = '';
  if (!st.text) hintEl.style.display = '';
}
function resetRings() {
  st.innerSub = false; st.innerSegs = ROOT_INNER;
  st.outerSub = false; st.outerSegs = ROOT_OUTER;
  st.innerRot = -90;   st.outerRot  = -90;
}

// ═══════════════════════════════════════════════════════════
//  HIT TEST
// ═══════════════════════════════════════════════════════════
function hitTest(mx, my) {
  const dx = mx - st.cx, dy = my - st.cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const R      = R_OUT * st.scale;
  const Rsplit = R * F_SPLIT;
  const Rdead  = R * F_DEAD;

  if (dist < Rdead || dist > R) return { ring: null, idx: -1 };

  let deg = Math.atan2(dy, dx) * (180 / Math.PI);
  if (deg < 0) deg += 360;

  const ring  = dist < Rsplit ? 'inner' : 'outer';
  const rot   = ring === 'inner' ? st.innerRot : st.outerRot;
  // Compute angle relative to this ring's rotation so index 0 = landing key
  const logical = ((deg - rot) % 360 + 360) % 360;
  const idx     = Math.floor(logical / SWEEP) % N;
  return { ring, idx };
}

// ═══════════════════════════════════════════════════════════
//  LONG-PRESS
// ═══════════════════════════════════════════════════════════
function startLp(ring, idx) {
  cancelLp();
  st.lpRing = ring; st.lpIdx = idx;
  st.lpStart = Date.now(); st.lpFiring = true;
  scheduleAnim();   // keeps draw running for progress arc
  lpTimer = setTimeout(() => fireLp(ring, idx), LP_MS);
}
function cancelLp() {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  st.lpFiring = false; st.lpRing = null; st.lpIdx = -1;
}
function fireLp(ring, idx) {
  lpTimer = null; st.lpFiring = false;

  const segs = ring === 'inner' ? st.innerSegs : st.outerSegs;
  const key  = segs[idx]?.label;
  if (!key) return;

  const subMap = ring === 'inner' ? SUB_INNER : SUB_OUTER;
  const chars  = subMap[key];
  if (!chars) return;

  // Rotate ring so sub[0] lands exactly where the long-pressed key was.
  // Key i starts at (rot + i*SWEEP), so advance rotation by i*SWEEP.
  if (ring === 'inner') {
    st.innerRot = ((st.innerRot + idx * SWEEP) % 360 + 360) % 360;
  } else {
    st.outerRot = ((st.outerRot + idx * SWEEP) % 360 + 360) % 360;
  }

  const built = buildSubSegs(chars);
  if (ring === 'inner') { st.innerSub = true; st.innerSegs = built; }
  else                  { st.outerSub = true; st.outerSegs = built; }

  st.lpRing = null; st.lpIdx = -1;
  // Reset highlight — next pointermove will re-evaluate with new rotation
  st.ring = null; st.idx = -1;
  // Announce sub-menu opened
  speak(built[0]?.label);
  draw();
}

// ═══════════════════════════════════════════════════════════
//  BUZZ: WORD PREDICTION ENGINE
// ═══════════════════════════════════════════════════════════

const segmenter = new Intl.Segmenter('ml', { granularity: 'grapheme' });
const sugEl = document.getElementById('sug');

document.getElementById('sug-left').addEventListener('pointerdown', e => {
  e.stopPropagation();
  sugEl.scrollBy({ left: -120, behavior: 'smooth' });
});
document.getElementById('sug-right').addEventListener('pointerdown', e => {
  e.stopPropagation();
  sugEl.scrollBy({ left: 120, behavior: 'smooth' });
});

function currentPrefix(text) {
  if (!text) return '';
  const lastSpace = text.lastIndexOf(' ');
  return lastSpace >= 0 ? text.slice(lastSpace + 1) : text;
}

function findSuggestions(fullText, wordPrefix, n) {
  const results = [];
  const seen    = new Set();

  function add(w) {
    if (!seen.has(w)) { seen.add(w); results.push(w); }
    return results.length >= n;
  }

  // 1. Full-text phrase match — catches multi-word phrases like "ഞാൻ കൂടെ"
  const trimmed = fullText ? fullText.trimEnd() : '';
  if (trimmed) {
    for (const w of ML_WORDS) {
      if (w.startsWith(trimmed) && w !== trimmed) { if (add(w)) return results; }
    }
  }

  // 2. Current-word prefix match — single-word completions
  if (wordPrefix) {
    for (const w of ML_WORDS) {
      if (w.startsWith(wordPrefix) && w.length > wordPrefix.length) { if (add(w)) return results; }
    }
  }

  return results;
}

function acceptSuggestion(word) {
  const lastSpace = st.text.lastIndexOf(' ');
  st.text = (lastSpace >= 0 ? st.text.slice(0, lastSpace + 1) : '') + word + ' ';
  refreshOut();
  renderSuggestions([]);
}

function renderSuggestions(words) {
  sugEl.innerHTML = '';
  words.forEach(w => {
    const chip = document.createElement('button');
    chip.className = 'sug-chip';
    chip.textContent = w;
    chip.addEventListener('pointerdown', e => { e.stopPropagation(); acceptSuggestion(w); });
    sugEl.appendChild(chip);
  });
}

function updateSugHighlight() {
  sugEl.querySelectorAll('.sug-chip').forEach((chip, i) =>
    chip.classList.toggle('selected', i === sugSelectedIdx));
}

function navigateSuggestion(dir) {
  if (!currentSuggestions.length) return false;
  const n = currentSuggestions.length;
  sugSelectedIdx = sugSelectedIdx === -1
    ? (dir > 0 ? 0 : n - 1)
    : Math.max(0, Math.min(n - 1, sugSelectedIdx + dir));
  updateSugHighlight();
  speakSingleSuggestion(currentSuggestions[sugSelectedIdx]);
  return true;
}

async function speakSingleSuggestion(word) {
  clearTimeout(sugSpeakTimer);
  ttsAudio.pause();
  if (sugAudio) { sugAudio.pause(); sugAudio = null; }
  try {
    const cached = await gargantuaFetch(word, hashText('nav\x00' + word));
    playSugClip(cached.url);
  } catch (_) {
    if (window.speechSynthesis) {
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(word);
      utt.lang = 'ml-IN'; utt.rate = 0.9;
      speechSynthesis.speak(utt);
    }
  }
}

function updateSuggestions() {
  const prefix = currentPrefix(st.text);
  const words  = findSuggestions(st.text, prefix, 6);
  currentSuggestions = words;
  sugSelectedIdx = -1;
  updateSugHighlight();
  renderSuggestions(words);
  speakAfterCommit(prefix, words);
}

// ═══════════════════════════════════════════════════════════
//  SYLLABLE COMPOSER
//  Consonant + full vowel → consonant + vowel sign (matra)
//  e.g.  ക + ആ → കാ    ക + അ → ക  (inherent 'a')
// ═══════════════════════════════════════════════════════════
const VOWEL_SIGN = {
  'അ': '',    // inherent 'a' — no sign
  'ആ': 'ാ',
  'ഇ': 'ി',
  'ഈ': 'ീ',
  'ഉ': 'ു',
  'ഊ': 'ൂ',
  'ഋ': 'ൃ',
  'ൠ': 'ൄ',
  'എ': 'െ',
  'ഏ': 'േ',
  'ഐ': 'ൈ',
  'ഒ': 'ൊ',
  'ഓ': 'ോ',
  'ഔ': 'ൗ',  // U+0D57 modern Au length mark (U+0D4C archaic)
};
const MALAYALAM_VOWELS = new Set(Object.keys(VOWEL_SIGN));

function isBareConsonant(grapheme) {
  if (!grapheme) return false;
  const cp = grapheme.codePointAt(0);
  const len = String.fromCodePoint(cp).length;
  // Single codepoint, no trailing combining chars
  if (grapheme.length !== len) return false;
  return (cp >= 0x0D15 && cp <= 0x0D39); // core consonants only; chillus (0D7A-0D7F) excluded
}

function lastGrapheme(text) {
  if (!text) return '';
  const segs = [...new Intl.Segmenter('ml', { granularity: 'grapheme' }).segment(text)];
  return segs.length ? segs[segs.length - 1].segment : '';
}

function composeText(current, newStr) {
  if (!newStr) return current;
  const firstCh = [...newStr][0];
  if (MALAYALAM_VOWELS.has(firstCh)) {
    const lastG = lastGrapheme(current);
    if (isBareConsonant(lastG)) {
      const sign = VOWEL_SIGN[firstCh];
      const base = current.slice(0, current.length - lastG.length);
      const tail = newStr.slice(firstCh.length); // e.g. 'ം' from 'അം'
      return base + lastG + sign + tail; // sign='' for inherent 'a' (e.g. ള+അം → ളം)
    }
  }
  return current + newStr;
}

// ═══════════════════════════════════════════════════════════
//  TEXT COMMIT
// ═══════════════════════════════════════════════════════════
function commitChar(str) {
  if (cursorPos >= 0 && cursorPos < st.text.length) {
    const before   = st.text.slice(0, cursorPos);
    const after    = st.text.slice(cursorPos);
    const composed = composeText(before, str);
    cursorPos      = composed.length;
    st.text        = composed + after;
  } else {
    st.text   = composeText(st.text, str);
    cursorPos = -1;
  }
  refreshOut();
  updateSuggestions();
  if (st.innerSub) { st.innerSub = false; st.innerSegs = ROOT_INNER; }
  if (st.outerSub) { st.outerSub = false; st.outerSegs = ROOT_OUTER; }
}
function deleteLast() {
  const target = cursorPos >= 0 && cursorPos < st.text.length
    ? st.text.slice(0, cursorPos) : st.text;
  const segs    = [...segmenter.segment(target)];
  const trimmed = segs.slice(0, -1).map(s => s.segment).join('');
  if (cursorPos >= 0 && cursorPos < st.text.length) {
    cursorPos = trimmed.length;
    st.text   = trimmed + st.text.slice(cursorPos + (target.length - trimmed.length));
  } else {
    st.text   = trimmed;
    cursorPos = -1;
  }
  if (!st.text) clearTTSCache();
  refreshOut();
  updateSuggestions();
}
function refreshOut() {
  const mid = cursorPos >= 0 && cursorPos < st.text.length;
  if (mid) {
    outEl.innerHTML =
      `<span class="rd">${escHtml(st.text.slice(0, cursorPos))}</span>` +
      `<span class="pcur"></span>` +
      `<span class="ur">${escHtml(st.text.slice(cursorPos))}</span>`;
    outEl.classList.remove('ph');
    outEl.classList.add('nocaret');
  } else if (st.text) {
    outEl.textContent = st.text;
    outEl.classList.remove('ph'); outEl.classList.remove('nocaret');
  } else {
    outEl.textContent = '';
    outEl.classList.add('ph');
    outEl.classList.remove('nocaret');
  }
}
function commitHighlighted() {
  if (!st.ring || st.idx < 0) return;
  const segs = st.ring === 'inner' ? st.innerSegs : st.outerSegs;
  const seg  = segs[st.idx];
  if (seg?.char) commitChar(seg.char);
}

const GARGANTUA = 'http://localhost:5050';

const sndBtn   = document.getElementById('snd');
const iconPlay = document.getElementById('icon-play');
const iconStop = document.getElementById('icon-stop');
let   playAudio = null;   // current Gargantua Audio element

function setSndPlaying(on) {
  iconPlay.style.display = on ? 'none' : '';
  iconStop.style.display = on ? ''     : 'none';
  on ? sndBtn.classList.add('playing')  : sndBtn.classList.remove('playing');
  on ? outEl.classList.add('playing')   : outEl.classList.remove('playing');
}

function cancelCursorTimers() {
  pendingCursorTimers.forEach(id => clearTimeout(id));
  pendingCursorTimers.length = 0;
}

function stopPlayback() {
  cancelCursorTimers();
  if (playAudio) { playAudio.pause(); playAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  setSndPlaying(false);
  refreshOut();
}

// ── TTS cache — keyed by text hash, value = Blob URL ─────────────────────
const ttsCache = new Map();

function hashText(text) {
  let h = 5381;
  for (let i = 0; i < text.length; i++)
    h = (((h << 5) + h) ^ text.charCodeAt(i)) >>> 0;
  return h.toString(36);
}

function clearTTSCache() {
  for (const entry of ttsCache.values()) URL.revokeObjectURL(entry.url);
  ttsCache.clear();
}

async function gargantuaFetch(text, cacheKey) {
  let cached = ttsCache.get(cacheKey);
  if (!cached) {
    const resp = await fetch(`${GARGANTUA}/tts`, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ text }),
      signal:  AbortSignal.timeout(10000),
    });
    if (!resp.ok) throw new Error('Gargantua error');
    const data = await resp.json();
    const bin  = atob(data.audio);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([bytes], {type: 'audio/mpeg'}));
    cached = { url, boundaries: data.boundaries || [] };
    ttsCache.set(cacheKey, cached);
  }
  return cached;
}

function playSugClip(url) {
  const audio = new Audio(url);
  sugAudio = audio;
  audio.onended = () => { if (sugAudio === audio) sugAudio = null; };
  audio.onerror = () => { if (sugAudio === audio) sugAudio = null; };
  audio.play().catch(() => {});
}

async function playViaGargantua(text) {
  const cached = await gargantuaFetch(text, hashText(text));

  cancelCursorTimers();
  const audio = new Audio(cached.url);
  playAudio = audio;

  // Schedule cursor jumps at the exact millisecond each word starts
  audio.onplay = () => {
    cached.boundaries.forEach(({charIndex, timeMs}) => {
      const id = setTimeout(() => {
        if (playAudio !== audio) return;
        cursorPos = snapGrapheme(text, charIndex);
        refreshOut();
      }, timeMs);
      pendingCursorTimers.push(id);
    });
  };

  audio.onended = () => {
    cancelCursorTimers();
    playAudio = null;
    cursorPos = -1;
    setSndPlaying(false);
    refreshOut();
  };
  audio.onerror = () => {
    cancelCursorTimers();
    playAudio = null;
    cursorPos = -1;
    setSndPlaying(false);
    refreshOut();
  };
  await audio.play();
}

function playViaSpeechSynthesis(text) {
  if (!window.speechSynthesis) { setSndPlaying(false); return; }
  const utt  = new SpeechSynthesisUtterance(text);
  utt.lang   = 'ml-IN';
  utt.rate   = 0.9;
  utt.onboundary = e => {
    if (e.name === 'word') {
      cursorPos = snapGrapheme(text, e.charIndex);
      refreshOut();
    }
  };
  utt.onend  = () => { cursorPos = -1; setSndPlaying(false); refreshOut(); };
  utt.onerror = () => { cursorPos = -1; setSndPlaying(false); refreshOut(); };
  speechSynthesis.cancel();
  setTimeout(() => speechSynthesis.speak(utt), 100);
}

sndBtn.addEventListener('click', async () => {
  if (sndBtn.classList.contains('playing')) { stopPlayback(); return; }
  if (!st.text.trim()) return;

  // Silence any suggestion clip before starting full readback
  clearTimeout(sugSpeakTimer);
  if (sugAudio) { sugAudio.pause(); sugAudio = null; }

  cursorPos = 0;
  refreshOut();
  setSndPlaying(true);

  try {
    await playViaGargantua(st.text);
  } catch (_) {
    playViaSpeechSynthesis(st.text);   // fallback when Gargantua not running
  }
});

// ═══════════════════════════════════════════════════════════
//  TTS — pre-recorded MP3s from Letter sounds/
// ═══════════════════════════════════════════════════════════
const ttsAudio = new Audio();
let ttsTimer = null;

function charToFile(char) {
  return 'Letter%20sounds/' +
    [...char].map(c => c.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')).join('_') +
    '.mp3?v=2';
}

function isMalayalam(char) {
  return char && [...char].every(c => { const cp = c.codePointAt(0); return cp >= 0x0D00 && cp <= 0x0D7F; });
}

// Non-Malayalam keys that have a pre-recorded MP3 in Letter sounds/
const HAS_SOUND = new Set([
  '123','1','2','3','4','5','6','7','8','9','0',
  '&','@','#','!','?','.',',','"',"'",'_',
]);

function speak(label) {
  if (!label || label === '–') return;
  if (!isMalayalam(label) && !HAS_SOUND.has(label)) return;
  clearTimeout(ttsTimer);
  ttsTimer = setTimeout(() => {
    ttsAudio.pause();
    ttsAudio.src = charToFile(label);
    ttsAudio.load();
    ttsAudio.play().catch(() => {});
  }, 80);
}

// After each character commit: read the current prefix then "നിർദ്ദേശങ്ങൾ: word1, word2 …"
// via Gargantua (Shobhana's voice), with speechSynthesis as offline fallback.
let sugSpeakTimer = null;
let sugAudio      = null;

async function speakAfterCommit(prefix, words) {
  clearTimeout(sugSpeakTimer);
  if (sndBtn.classList.contains('playing')) return;

  const parts = [];
  if (prefix) parts.push(prefix);
  if (words.length) parts.push('നിർദ്ദേശങ്ങൾ: ' + words.join(', '));
  if (!parts.length) return;

  const text = parts.join('. ');

  sugSpeakTimer = setTimeout(async () => {
    // Stop the letter-sound and any in-flight suggestion clip
    ttsAudio.pause();
    if (sugAudio) { sugAudio.pause(); sugAudio = null; }
    if (sndBtn.classList.contains('playing')) return;

    try {
      const cached = await gargantuaFetch(text, hashText('sug\x00' + text));
      playSugClip(cached.url);
    } catch (_) {
      // Gargantua offline — fall back to browser speechSynthesis
      if (window.speechSynthesis) {
        speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'ml-IN';
        utt.rate = 0.9;
        speechSynthesis.speak(utt);
      }
    }
  }, 300);
}

}

// ═══════════════════════════════════════════════════════════
//  POINTER EVENTS
// ═══════════════════════════════════════════════════════════
cv.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (!inTriggerZone(e.offsetX, e.offsetY)) return;
  isDown = true;
  isSwiping = false;
  pdX = e.offsetX; pdY = e.offsetY;
  beyondDir = 0;
  innerRotSet = false; outerRotSet = false;
  resetRings();
  // Delay wheel by 80 ms so a fast horizontal swipe can be caught first
  clearTimeout(wheelDelayTimer);
  wheelDelayTimer = setTimeout(() => {
    wheelDelayTimer = null;
    if (isDown && !isSwiping) showWheel(pdX, pdY);
  }, 80);
});

cv.addEventListener('pointermove', e => {
  if (!isDown) return;

  // ── Pre-wheel swipe detection (while wheel delay is pending) ──────────
  if (wheelDelayTimer !== null) {
    const dx = e.offsetX - pdX, dy = e.offsetY - pdY;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx >= 35 && adx >= ady * 2) {
      // Horizontal swipe detected — cancel wheel, navigate suggestion
      if (navigateSuggestion(dx > 0 ? 1 : -1)) {
        isSwiping = true;
        clearTimeout(wheelDelayTimer); wheelDelayTimer = null;
      } else {
        // No suggestions — show wheel immediately instead
        clearTimeout(wheelDelayTimer); wheelDelayTimer = null;
        showWheel(pdX, pdY);
      }
    } else if (ady > 20) {
      // Clearly not a swipe — show wheel now
      clearTimeout(wheelDelayTimer); wheelDelayTimer = null;
      showWheel(pdX, pdY);
    }
    return;
  }

  if (isSwiping || !st.visible) return;

  // Determine which ring the finger is in (by distance only, rotation-independent)
  const dx = e.offsetX - st.cx, dy = e.offsetY - st.cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const R      = R_OUT * st.scale;
  const Rsplit = R * F_SPLIT;
  const Rdead  = R * F_DEAD;
  let rawDeg = Math.atan2(dy, dx) * (180 / Math.PI);
  if (rawDeg < 0) rawDeg += 360;

  // Snap rotation on first entry into each ring so index 0 is under the finger
  if (dist >= Rdead && dist < Rsplit && !innerRotSet) {
    st.innerRot = rawDeg;
    innerRotSet = true;
  }
  if (dist >= Rsplit && dist <= R && !outerRotSet) {
    st.outerRot = rawDeg;
    outerRotSet = true;
  }

  // Inner zone: show inner ring only (outer stays if already visible).
  // Outer zone: show both rings together; once outer is seen, both remain visible.
  if (dist >= Rdead && dist < Rsplit) {
    if (innerTargetAlpha !== 1) { innerTargetAlpha = 1; scheduleAnim(); }
  } else if (dist >= Rsplit && dist <= R) {
    let changed = false;
    if (outerTargetAlpha !== 1) { outerTargetAlpha = 1; changed = true; }
    if (innerTargetAlpha !== 1) { innerTargetAlpha = 1; changed = true; }
    if (changed) scheduleAnim();
  }

  // Track whether finger has gone beyond the outer ring (R already declared above)
  const newBeyond = dist > R ? (dx > 0 ? 1 : -1) : 0;
  if (newBeyond !== beyondDir) { beyondDir = newBeyond; draw(); }

  const { ring, idx } = hitTest(e.offsetX, e.offsetY);

  // Cancel LP if moved beyond ring or to a different segment
  if (beyondDir !== 0) {
    cancelLp();
    if (ring !== st.ring || idx !== st.idx) { st.ring = null; st.idx = -1; draw(); }
    return;
  }

  if (ring !== st.lpRing || idx !== st.lpIdx) {
    cancelLp();
    if (ring && idx >= 0) startLp(ring, idx);
  }

  if (ring !== st.ring || idx !== st.idx) {
    st.ring = ring; st.idx = idx; draw();
    if (ring && idx >= 0) {
      const segs = ring === 'inner' ? st.innerSegs : st.outerSegs;
      speak(segs[idx]?.label);
      if (ring === 'inner') playSound(sndInner);
      else                  playSound(sndOuter);
    }
  }
});

cv.addEventListener('pointerup', e => {
  if (!isDown) return;
  isDown = false;
  clearTimeout(wheelDelayTimer); wheelDelayTimer = null;
  cancelLp();

  // Finish horizontal swipe — gesture already handled in pointermove
  if (isSwiping) { isSwiping = false; return; }

  // Double-tap → accept currently highlighted suggestion
  const now = performance.now();
  if (now - lastTapTime < DOUBLE_TAP_MS && sugSelectedIdx >= 0 && currentSuggestions.length) {
    lastTapTime = 0;
    acceptSuggestion(currentSuggestions[sugSelectedIdx]);
    sugSelectedIdx = -1;
    updateSugHighlight();
    if (st.visible) hideWheel();
    return;
  }
  lastTapTime = now;

  if (!st.visible) return;   // quick tap (< 80 ms) — wheel never shown, nothing to commit

  const dx   = e.offsetX - st.cx;
  const dy   = e.offsetY - st.cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const R    = R_OUT * st.scale;

  if (dist > R) {
    if (dx > 0) commitChar(' ');
    else        deleteLast();
  } else if (dist < R * F_DEAD) {
    if (st.innerSub || st.outerSub) resetRings();
  } else {
    commitHighlighted();
  }

  hideWheel();
});

cv.addEventListener('pointerleave', () => {
  if (isDown) {
    isDown = false;
    isSwiping = false;
    clearTimeout(wheelDelayTimer); wheelDelayTimer = null;
    cancelLp();
    if (st.visible) hideWheel();
  }
});

// ═══════════════════════════════════════════════════════════
//  DRAW — annular sector helper
// ═══════════════════════════════════════════════════════════
function annulus(cx, cy, r1, r2, sDeg, sweepDeg) {
  const sa = sDeg * Math.PI / 180;
  const ea = (sDeg + sweepDeg) * Math.PI / 180;
  ctx.beginPath();
  ctx.arc(cx, cy, r2, sa, ea, false);
  ctx.arc(cx, cy, r1, ea, sa, true);
  ctx.closePath();
}

const ML_RE  = /[\u0D00-\u0D7F]/;
const ML_FN  = px => `700 ${Math.max(px,8)}px "Noto Sans Malayalam",sans-serif`;
const SYS_FN = px => `700 ${Math.max(px,8)}px "Segoe UI",sans-serif`;

function segFont(label, px) {
  return ML_RE.test(label) ? ML_FN(px) : SYS_FN(px);
}

// ═══════════════════════════════════════════════════════════
//  MAIN DRAW
// ═══════════════════════════════════════════════════════════
function draw() {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  if (!st.visible && st.scale < 0.01) return;

  const s      = st.scale;
  const cx     = st.cx, cy = st.cy;
  const R      = R_OUT * s;
  const Rsplit = R * F_SPLIT;
  const Rdead  = R * F_DEAD;

  // ── OUTER RING segments ───────────────────────────────
  ctx.save(); ctx.globalAlpha = outerAlpha;
  for (let i = 0; i < N; i++) {
    const sDeg = st.outerRot + i * SWEEP;
    const isHi = st.ring === 'outer' && st.idx === i;
    const seg  = st.outerSegs[i];
    const isSub = st.outerSub;

    annulus(cx, cy, Rsplit, R, sDeg, SWEEP);
    ctx.fillStyle = !seg     ? 'rgba(40,35,32,0.6)'
                  : isHi     ? (isSub ? C_SUB_HI : C_OUTER_HI)
                  : isSub    ? C_SUB_BASE
                  :            C_OUTER_BASE;
    ctx.fill();
  }
  ctx.restore();

  // ── INNER RING segments ───────────────────────────────
  ctx.save(); ctx.globalAlpha = innerAlpha;
  for (let i = 0; i < N; i++) {
    const sDeg = st.innerRot + i * SWEEP;
    const isHi = st.ring === 'inner' && st.idx === i;
    const seg  = st.innerSegs[i];
    const isSub = st.innerSub;

    annulus(cx, cy, Rdead, Rsplit, sDeg, SWEEP);
    ctx.fillStyle = !seg     ? 'rgba(30,28,26,0.6)'
                  : isHi     ? (isSub ? C_SUB_HI : C_INNER_HI)
                  : isSub    ? C_SUB_BASE
                  :            C_INNER_BASE;
    ctx.fill();
  }
  ctx.restore();

  // ── LONG-PRESS PROGRESS ARC ───────────────────────────
  if (st.lpFiring && st.lpIdx >= 0 && st.lpStart > 0) {
    const lpAlpha = st.lpRing === 'inner' ? innerAlpha : outerAlpha;
    ctx.save(); ctx.globalAlpha = lpAlpha;
    const elapsed  = Date.now() - st.lpStart;
    const progress = Math.min(elapsed / LP_MS, 1);
    const rot      = st.lpRing === 'inner' ? st.innerRot : st.outerRot;
    const sDeg     = rot + st.lpIdx * SWEEP;
    const pSweep   = SWEEP * progress;
    const r1 = st.lpRing === 'inner' ? Rdead  : Rsplit;
    const r2 = st.lpRing === 'inner' ? Rsplit : R;

    // Track
    annulus(cx, cy, r1, r2, sDeg, SWEEP);
    ctx.fillStyle = C_LP_TRACK; ctx.fill();

    // Fill
    if (pSweep > 0) {
      annulus(cx, cy, r1, r2, sDeg, pSweep);
      ctx.fillStyle = C_LP_PROGRESS;
      ctx.save(); ctx.globalAlpha = 0.55; ctx.fill(); ctx.restore();
    }

    // Label "hold…"
    const midDeg = sDeg + SWEEP / 2;
    const midR   = r1 + (r2 - r1) * 0.5;
    const lx = cx + Math.cos(midDeg * Math.PI/180) * midR;
    const ly = cy + Math.sin(midDeg * Math.PI/180) * midR;
    const secLeft = Math.ceil((LP_MS - elapsed) / 1000);
    ctx.save();
    ctx.font = SYS_FN(R * 0.08);
    ctx.fillStyle = 'rgba(255,220,80,0.9)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(secLeft + 's', lx, ly);
    ctx.restore();
    ctx.restore();
  }

  // ── DIVIDER LINES — inner ring ──────────────────────
  ctx.save(); ctx.globalAlpha = innerAlpha;
  ctx.strokeStyle = C_DIVIDER; ctx.lineWidth = 1.2;
  for (let i = 0; i < N; i++) {
    const rad = (st.innerRot + i * SWEEP) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(rad)*Rdead, cy + Math.sin(rad)*Rdead);
    ctx.lineTo(cx + Math.cos(rad)*Rsplit, cy + Math.sin(rad)*Rsplit);
    ctx.stroke();
  }
  ctx.restore();
  // ── DIVIDER LINES — outer ring ──────────────────────
  ctx.save(); ctx.globalAlpha = outerAlpha;
  ctx.strokeStyle = C_DIVIDER; ctx.lineWidth = 1.2;
  for (let i = 0; i < N; i++) {
    const rad = (st.outerRot + i * SWEEP) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(rad)*Rsplit, cy + Math.sin(rad)*Rsplit);
    ctx.lineTo(cx + Math.cos(rad)*R,      cy + Math.sin(rad)*R);
    ctx.stroke();
  }
  ctx.restore();

  // ── RING-SPLIT CIRCLE ─────────────────────────────────
  ctx.save(); ctx.globalAlpha = Math.max(innerAlpha, outerAlpha);
  ctx.beginPath(); ctx.arc(cx, cy, Rsplit, 0, Math.PI*2);
  ctx.strokeStyle = C_SPLIT_LINE; ctx.lineWidth = 1.3; ctx.stroke();
  ctx.restore();

  // ── OUTER EDGE CIRCLE ─────────────────────────────────
  ctx.save(); ctx.globalAlpha = outerAlpha;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.09)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // ── OUTER RING LABELS ─────────────────────────────────
  ctx.save(); ctx.globalAlpha = outerAlpha;
  const LR_o = Rsplit + (R - Rsplit) * 0.52;
  for (let i = 0; i < N; i++) {
    const seg = st.outerSegs[i];
    if (!seg) {
      // Empty slot — dim dash
      const midD = (st.outerRot + i*SWEEP + SWEEP/2) * Math.PI/180;
      const lx = cx + Math.cos(midD)*LR_o, ly = cy + Math.sin(midD)*LR_o;
      ctx.save();
      ctx.font = SYS_FN(R*0.08); ctx.fillStyle = C_NULL_TEXT;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('–', lx, ly); ctx.restore();
      continue;
    }
    const midD  = (st.outerRot + i*SWEEP + SWEEP/2) * Math.PI/180;
    const lx    = cx + Math.cos(midD)*LR_o;
    const ly    = cy + Math.sin(midD)*LR_o;
    const isHi  = st.ring === 'outer' && st.idx === i;
    const isSub = st.outerSub;
    const len   = [...seg.label].length;
    const fsPx  = R * (len <= 1 ? 0.150 : len <= 2 ? 0.120 : 0.090);

    ctx.save();
    ctx.font         = segFont(seg.label, fsPx);
    ctx.fillStyle    = isHi ? (isSub ? C_SUB_HI_TEXT : C_HI_TEXT)
                            : isSub ? C_SUB_TEXT : C_OUTER_TEXT;
    ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(seg.label, lx, ly);
    ctx.restore();
  }
  ctx.restore();

  // ── INNER RING LABELS ─────────────────────────────────
  ctx.save(); ctx.globalAlpha = innerAlpha;
  const LR_i = Rdead + (Rsplit - Rdead) * 0.52;
  for (let i = 0; i < N; i++) {
    const seg = st.innerSegs[i];
    if (!seg) {
      const midD = (st.innerRot + i*SWEEP + SWEEP/2) * Math.PI/180;
      const lx = cx + Math.cos(midD)*LR_i, ly = cy + Math.sin(midD)*LR_i;
      ctx.save();
      ctx.font = SYS_FN(R*0.07); ctx.fillStyle = C_NULL_TEXT;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('–', lx, ly); ctx.restore();
      continue;
    }
    const midD  = (st.innerRot + i*SWEEP + SWEEP/2) * Math.PI/180;
    const lx    = cx + Math.cos(midD)*LR_i;
    const ly    = cy + Math.sin(midD)*LR_i;
    const isHi  = st.ring === 'inner' && st.idx === i;
    const isSub = st.innerSub;
    const len   = [...seg.label].length;
    const fsPx  = R * (len <= 1 ? 0.115 : len <= 2 ? 0.090 : 0.072);

    ctx.save();
    ctx.font         = segFont(seg.label, fsPx);
    ctx.fillStyle    = isHi ? (isSub ? C_SUB_HI_TEXT : C_HI_TEXT)
                            : isSub ? C_SUB_TEXT : C_INNER_TEXT;
    ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(seg.label, lx, ly);
    ctx.restore();
  }
  ctx.restore();

  // ── HIGHLIGHT GLOW OUTLINE ────────────────────────────
  if (st.ring && st.idx >= 0) {
    const hiAlpha = st.ring === 'inner' ? innerAlpha : outerAlpha;
    ctx.save(); ctx.globalAlpha = hiAlpha;
    const rot    = st.ring === 'inner' ? st.innerRot : st.outerRot;
    const sDeg   = rot + st.idx * SWEEP;
    const sa     = sDeg * Math.PI/180;
    const ea     = (sDeg + SWEEP) * Math.PI/180;
    const r1     = st.ring === 'inner' ? Rdead  : Rsplit;
    const r2     = st.ring === 'inner' ? Rsplit : R;
    const isSub  = st.ring === 'inner' ? st.innerSub : st.outerSub;
    const hiCol  = isSub ? C_SUB_HI
                : st.ring === 'inner' ? C_INNER_HI : C_OUTER_HI;

    ctx.beginPath();
    ctx.arc(cx, cy, r2-1, sa, ea);
    ctx.arc(cx, cy, r1+1, ea, sa, true);
    ctx.closePath();
    ctx.strokeStyle = hiCol; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.restore();
  }

  // ── BEYOND-RING ACTION HINT ───────────────────────────
  if (beyondDir !== 0 && s > 0.3) {
    const label = beyondDir > 0 ? 'SPC' : '⌫';
    const col   = beyondDir > 0 ? 'rgba(255,167,38,0.85)' : 'rgba(239,83,80,0.85)';
    const tx    = cx + beyondDir * R * 1.28;
    ctx.save();
    ctx.font = SYS_FN(R * 0.11);
    ctx.fillStyle = col;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
    ctx.fillText(label, tx, cy);
    ctx.restore();
  }

  // ── CENTER CIRCLE ─────────────────────────────────────
  ctx.beginPath(); ctx.arc(cx, cy, Rdead, 0, Math.PI*2);
  ctx.fillStyle = C_CENTER; ctx.fill();
}
</script>
</body>
